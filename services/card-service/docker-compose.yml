services:
  card-db:
    image: postgres:16
    environment:
      POSTGRES_DB: card_db
      POSTGRES_USER: card_user
      POSTGRES_PASSWORD: card_pass
    ports:
      - "5440:5432"
    volumes:
      - card-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  card-db-data:
